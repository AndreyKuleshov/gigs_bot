# fly.toml — generated for gigs_bot
# Replace "gigs-bot" with whatever name fly apps create assigns you.

app = "gigs-bot"
primary_region = "ams"  # Amsterdam — change to the region closest to you

[build]

[env]
  API_HOST = "0.0.0.0"
  DEBUG    = "false"

[http_service]
  internal_port       = 8000
  force_https         = true
  auto_stop_machines  = false   # keep alive — bot needs a persistent process
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
